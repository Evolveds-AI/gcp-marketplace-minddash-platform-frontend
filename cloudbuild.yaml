steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud run services describe minddash-backend --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/backend_url.txt
        gcloud run services describe minddash-rag --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/rag_url.txt
        gcloud run services describe minddash-dashboards --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/dash_url.txt
    id: get-urls

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_BACKEND_API_URL="$(cat /workspace/backend_url.txt)" \
          --build-arg NEXT_PUBLIC_RAG_API_URL="$(cat /workspace/rag_url.txt)" \
          --build-arg NEXT_PUBLIC_DASHBOARDS_API_URL="$(cat /workspace/dash_url.txt)" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest .
    id: build
    waitFor: ['get-urls']

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend']
    id: push
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud run services describe minddash-agent --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/agent_url.txt
        gcloud run services describe minddash-mindsdb --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' > /workspace/mindsdb_url.txt
        gcloud run services describe minddash-frontend --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null > /workspace/frontend_url.txt || echo "" > /workspace/frontend_url.txt
        gcloud secrets versions access latest --secret=minddash-jwt-secret --project=$PROJECT_ID > /workspace/jwt_secret.txt
        gcloud secrets versions access latest --secret=minddash-nextauth-secret --project=$PROJECT_ID > /workspace/nextauth_secret.txt
        gcloud secrets versions access latest --secret=minddash-db-url-frontend --project=$PROJECT_ID > /workspace/db_url.txt
        if [ -n "${_DOMAIN}" ]; then echo "${_DOMAIN}" > /workspace/nextauth_url.txt; else cat /workspace/frontend_url.txt > /workspace/nextauth_url.txt; fi
        gcloud run deploy minddash-frontend \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA \
          --region=${_REGION} --project=$PROJECT_ID \
          --service-account=minddash-frontend-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --update-env-vars="NEXT_PUBLIC_BACKEND_API_URL=$(cat /workspace/backend_url.txt),NEXT_PUBLIC_RAG_API_URL=$(cat /workspace/rag_url.txt),NEXT_PUBLIC_DASHBOARDS_API_URL=$(cat /workspace/dash_url.txt),AGENT_SERVICE_URL=$(cat /workspace/agent_url.txt)/chat,BAYER_API_URL=$(cat /workspace/agent_url.txt)/chat,MINDSDB_SERVER_URL=$(cat /workspace/mindsdb_url.txt),NEXTAUTH_URL=$(cat /workspace/nextauth_url.txt),JWT_SECRET=$(cat /workspace/jwt_secret.txt),JWT_REFRESH_SECRET=$(cat /workspace/jwt_secret.txt),NEXTAUTH_SECRET=$(cat /workspace/nextauth_secret.txt),MINDDASH_DB_URL=$(cat /workspace/db_url.txt),DATABASE_URL=$(cat /workspace/db_url.txt)"
    id: deploy
    waitFor: ['push']

substitutions:
  _REGION: us-central1
  _REPO: minddash-repo
  _DOMAIN: ''

options:
  substitution_option: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
