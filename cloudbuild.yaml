steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        BACKEND_URL=$(gcloud run services describe minddash-backend --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)')
        RAG_URL=$(gcloud run services describe minddash-rag --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)')
        DASH_URL=$(gcloud run services describe minddash-dashboards --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)')
        echo "BACKEND_URL=${BACKEND_URL}" > /workspace/urls.env
        echo "RAG_URL=${RAG_URL}" >> /workspace/urls.env
        echo "DASH_URL=${DASH_URL}" >> /workspace/urls.env
    id: get-urls

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - -c
      - |
        source /workspace/urls.env
        docker build \
          --build-arg NEXT_PUBLIC_BACKEND_API_URL="${BACKEND_URL}" \
          --build-arg NEXT_PUBLIC_RAG_API_URL="${RAG_URL}" \
          --build-arg NEXT_PUBLIC_DASHBOARDS_API_URL="${DASH_URL}" \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA \
          -t ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest .
    id: build
    waitFor: ['get-urls']

  - name: 'gcr.io/cloud-builders/docker'
    args: [push, '--all-tags', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend']
    id: push
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        source /workspace/urls.env
        AGENT_URL=$(gcloud run services describe minddash-agent --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)')
        MINDSDB_URL=$(gcloud run services describe minddash-mindsdb --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)')
        FRONTEND_URL=$(gcloud run services describe minddash-frontend --region=${_REGION} --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null || echo "")
        NEXTAUTH_URL="${_DOMAIN:-${FRONTEND_URL}}"
        JWT_SECRET=$(gcloud secrets versions access latest --secret=minddash-jwt-secret --project=$PROJECT_ID)
        NEXTAUTH_SECRET=$(gcloud secrets versions access latest --secret=minddash-nextauth-secret --project=$PROJECT_ID)
        DB_URL=$(gcloud secrets versions access latest --secret=minddash-db-url-frontend --project=$PROJECT_ID)
        gcloud run deploy minddash-frontend \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$COMMIT_SHA \
          --region=${_REGION} --project=$PROJECT_ID \
          --service-account=minddash-frontend-sa@$PROJECT_ID.iam.gserviceaccount.com \
          --update-env-vars="NEXT_PUBLIC_BACKEND_API_URL=${BACKEND_URL},NEXT_PUBLIC_RAG_API_URL=${RAG_URL},NEXT_PUBLIC_DASHBOARDS_API_URL=${DASH_URL},AGENT_SERVICE_URL=${AGENT_URL}/chat,BAYER_API_URL=${AGENT_URL}/chat,MINDSDB_SERVER_URL=${MINDSDB_URL},NEXTAUTH_URL=${NEXTAUTH_URL},JWT_SECRET=${JWT_SECRET},JWT_REFRESH_SECRET=${JWT_SECRET},NEXTAUTH_SECRET=${NEXTAUTH_SECRET},MINDDASH_DB_URL=${DB_URL},DATABASE_URL=${DB_URL}"
    id: deploy
    waitFor: ['push']

substitutions:
  _REGION: us-central1
  _REPO: minddash-repo
  _DOMAIN: ''

options:
  substitution_option: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
