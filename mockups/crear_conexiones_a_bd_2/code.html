<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<title>MindDash - Nueva Conexión</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#135bec",
            "background-light": "#f6f6f8",
            "background-dark": "#101622",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 24
    }
  </style>
</head>
<body class="font-display bg-background-dark text-slate-200">
<div class="flex h-screen">
<aside class="flex w-64 flex-col border-r border-slate-800 bg-background-dark">
<div class="flex h-16 items-center px-6">
<h1 class="text-xl font-bold text-white">MindDash</h1>
</div>
<nav class="flex-1 space-y-2 px-4 py-4">
<a class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-slate-400 hover:bg-slate-800" href="#">
<span class="material-symbols-outlined">folder</span>
<span>Proyectos</span>
</a>
<a class="flex items-center gap-3 rounded bg-primary/20 px-3 py-2 text-sm font-medium text-primary" href="#">
<span class="material-symbols-outlined">database</span>
<span>Conexiones</span>
</a>
<a class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-slate-400 hover:bg-slate-800" href="#">
<span class="material-symbols-outlined">group</span>
<span>Usuarios</span>
</a>
<a class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-slate-400 hover:bg-slate-800" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span>Dashboards</span>
</a>
</nav>
<div class="mt-auto p-4">
<a class="flex items-center gap-3 rounded px-3 py-2 text-sm font-medium text-slate-400 hover:bg-slate-800" href="#">
<span class="material-symbols-outlined">settings</span>
<span>Administración</span>
</a>
</div>
</aside>
<div class="flex flex-1 flex-col">
<header class="flex h-16 items-center justify-between border-b border-slate-800 px-6">
<div class="flex items-center gap-2 text-sm text-slate-400">
<a class="hover:text-slate-200" href="#">Tech Solutions</a>
</div>
<div class="flex items-center gap-4">
<button class="flex h-8 w-8 items-center justify-center rounded-lg bg-slate-800 hover:bg-slate-700">
<span class="material-symbols-outlined text-lg">add</span>
</button>
<div class="h-9 w-9 rounded-full bg-cover bg-center" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBNXwZY1ispdVqwkXOA0pVACCDqi0FgcWNC-dLEcdtC17RcJgvpy8QcNbAbEnXVNlDTjCY4OStkggdr7iCtTzi1sgJY4Vo8x2HfQ_09oqGbG0Lg73yb4zdSPT7LQ6HZtscI3W65pWgKAoapg-c6x3LcYkhF-nOcSSBPqDasY94bvgiEG7q2vsLkvpT86WSTmG2SD6-ABW_WrAKiEpxTezLoIasz0dW74sI3M8xKLQfhj-qdQ57NCnkGZoiRIJ5Aa7w3htJPphoK5WM");'></div>
</div>
</header>
<main class="flex-1 p-8">
<div class="mx-auto max-w-2xl">
<h2 class="text-3xl font-bold text-white">Nueva conexión de Base de Datos</h2>
<p class="mt-2 text-slate-400">Configure una nueva fuente de datos para sus chatbots.</p>
<form class="mt-8 space-y-6">
<div>
<label class="block text-sm font-medium text-slate-300" for="data-source">Fuente de datos</label>
<div class="relative mt-1">
<select class="block w-full appearance-none rounded border-slate-700 bg-slate-800 text-white focus:border-primary focus:ring-primary" id="data-source">
<option selected="">PostgreSQL</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-400">
<span class="material-symbols-outlined">
unfold_more
</span>
</div>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-300" for="connection-string">Cadena de conexión</label>
<input class="mt-1 block w-full rounded border-slate-700 bg-slate-800 text-white focus:border-primary focus:ring-primary" id="connection-string" placeholder="postgresql://user:password@host:port/database" type="text"/>
</div>
<div class="flex justify-end pt-4">
<button class="rounded bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-primary/90 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary" type="submit">
                Crear conexión
              </button>
</div>
</form>
</div>
</main>
</div>
</div>

</body></html>
