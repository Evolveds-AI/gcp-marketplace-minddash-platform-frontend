[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# Configuración específica para Next.js
[build.environment]
  NETLIFY_USE_YARN = "false"
  NODE_VERSION = "18"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirección para las funciones serverless con máxima prioridad
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# Redirección para las funciones serverless genéricas
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Configuración para manejar el enrutamiento de Next.js
[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200

[[redirects]]
  from = "/_next/*"
  to = "/_next/:splat"
  status = 200

# Asegurar que todas las rutas sean manejadas por Next.js
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Configuración de headers para CORS - permitir todas las solicitudes
[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept, Authorization, X-Requested-With"
    Access-Control-Max-Age = "86400"
